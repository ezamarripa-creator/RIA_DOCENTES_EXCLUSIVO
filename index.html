<!DOCTYPE html>
<html lang="es">
<head>

    <script>
    (function() {
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
      
       document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            if ((e.ctrlKey && (key === 'u' || key === 's' || key === 'c' || key === 'i' || key === 'j')) ||
                (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) ||
                e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        });
        
        let devtoolsTriggered = false;
        setInterval(function() {
            if (devtoolsTriggered) return;
            const before = new Date();
            debugger; 
            const after = new Date();
            if (after - before > 100) { 
                devtoolsTriggered = true;
                document.body.innerHTML = '<div style="text-align:center; padding:50px; font-family:sans-serif;"><h1 style="color:#042C53;">⚠️ Acceso no autorizado</h1><p>El uso de herramientas de desarrollo no está permitido en este recurso institucional.</p><p style="font-size:14px; margin-top:30px;">🔒 COBAED · Dirección Académica</p></div>';
            }
        }, 2000);
        
        const style = document.createElement('style');
        style.textContent = `body { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; }`;
        document.head.appendChild(style);
    })();
    </script>


    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SEMS - RIA Dashboard v5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --negro: #0f172a; --tierra: #78350f; --beige: #f5f5f4; }
        body { font-family: 'Inter', sans-serif; background-color: var(--beige); color: var(--negro); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); }
        .stat-card { border-left: 4px solid var(--tierra); }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 999; align-items: center; justify-content: center; color: white; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loader" class="loading-overlay font-bold">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-amber-500 mb-4"></div>
        <span class="text-xl tracking-widest uppercase" id="loader-text">Procesando Datos Académicos...</span>
    </div>

    <header class="bg-[#0f172a] text-white p-6 shadow-2xl mb-6">
        <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter uppercase">Sistema SEMS <span class="text-amber-500 italic">RIA</span></h1>
                <p class="text-[10px] tracking-[0.4em] text-stone-400">PLANTILLA DE CONTROL ACADÉMICO PROFESIONAL</p>
            </div>
            <div class="flex flex-wrap gap-2 justify-center">
                <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx">
                <button onclick="document.getElementById('fileInput').click()" class="bg-stone-700 hover:bg-stone-600 px-4 py-2 rounded-lg text-xs font-bold transition-all">ACTUALIZAR EXCEL</button>
                <button onclick="exportToExcel()" class="bg-emerald-700 hover:bg-emerald-600 px-4 py-2 rounded-lg text-xs font-bold transition-all">EXCEL</button>
                <button onclick="exportToPDF()" class="bg-red-700 hover:bg-red-600 px-4 py-2 rounded-lg text-xs font-bold transition-all">PDF ELEGANTE</button>
                <button onclick="clearDatabase()" class="bg-red-900/40 hover:bg-red-800 px-4 py-2 rounded-lg text-xs font-bold transition-all border border-red-700/50">LIMPIAR CACHÉ</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="glass p-5 rounded-2xl stat-card shadow-sm"><p class="text-[10px] font-bold text-stone-500 uppercase">Alumnos Únicos</p><h2 id="stat-alumnos" class="text-3xl font-black text-slate-800">0</h2></div>
            <div class="glass p-5 rounded-2xl stat-card shadow-sm"><p class="text-[10px] font-bold text-stone-500 uppercase">Registros en Vista</p><h2 id="stat-registros" class="text-3xl font-black text-slate-800">0</h2></div>
            <div class="glass p-5 rounded-2xl stat-card shadow-sm"><p class="text-[10px] font-bold text-stone-500 uppercase">Planteles</p><h2 id="stat-planteles" class="text-3xl font-black text-slate-800">0</h2></div>
            <div class="glass p-5 rounded-2xl stat-card shadow-sm"><p class="text-[10px] font-bold text-stone-500 uppercase">Promedio Global</p><h2 id="stat-promedio" class="text-3xl font-black text-emerald-700">0.0</h2></div>
        </div>

        <section class="glass rounded-2xl p-6 mb-6 shadow-sm border border-stone-200">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">PLANTEL</label><select id="f-plantel" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">SEMESTRE</label><select id="f-semestre" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">DOCENTE</label><select id="f-docente" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">TURNO</label><select id="f-turno" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">TIPO ALUMNO</label><select id="f-tipo" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">SECTOR</label><select id="f-sector" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none"></select></div>
                <div><label class="block text-[9px] font-bold text-stone-400 mb-1">SEMÁFORO</label>
                    <select id="f-semaforo" onchange="applyFilters()" class="w-full bg-stone-50 border p-2 rounded-lg text-xs font-bold outline-none">
                        <option value="ALL">TODOS</option><option value="ROJO">🔴 0-4</option><option value="AMARILLO">🟡 4.1-6</option><option value="NARANJA">🟠 6.1-8</option><option value="VERDE">🟢 +8</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="glass p-4 rounded-2xl h-60" id="chart-genero"></div>
            <div class="glass p-4 rounded-2xl h-60" id="chart-turno"></div>
            <div class="glass p-4 rounded-2xl h-60" id="chart-estatus"></div>
            <div class="glass p-4 rounded-2xl h-60" id="chart-tipo"></div>
            <div class="glass p-4 rounded-2xl h-60 md:col-span-2" id="chart-rangos"></div>
            <div class="glass p-4 rounded-2xl h-60 md:col-span-2" id="chart-ranking"></div>
        </div>

        <div class="glass rounded-2xl overflow-hidden shadow-sm border border-stone-200">
            <div class="overflow-y-auto max-h-[600px]">
                <table class="w-full text-left text-[11px]" id="mainTable">
                    <thead class="bg-slate-900 text-white sticky top-0 z-10">
                        <tr>
                            <th class="p-3 text-center">REGISTROS</th>
                            <th class="p-3">PLANTEL</th>
                            <th class="p-3 text-center">SEM.</th>
                            <th class="p-3">TURNO</th>
                            <th class="p-3 text-center">GP</th>
                            <th class="p-3">ALUMNO</th>
                            <th class="p-3">MATERIA</th>
                            <th class="p-3 text-center">PROM.</th>
                            <th class="p-3 text-center">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-stone-100 italic"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const GITHUB_DATA_URL = 'RIACarga.xlsx'; // Ruta relativa al archivo en GitHub/Servidor
        const DB_NAME = 'SemsRia_FinalV5';
        const STORE_NAME = 'data';
        let db, dataGlobal = [], dataFiltered = [];

        const initDB = () => new Promise(res => {
            const req = indexedDB.open(DB_NAME, 1);
            req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { autoIncrement: true });
            req.onsuccess = (e) => { db = e.target.result; res(); };
        });

        // Función central para procesar datos (usada por FileInput y Fetch)
        async function processAndSaveData(arrayBuffer) {
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const processed = json.map(r => ({
                Plantel: r.plantel || 'N/A',
                Semestre: r.semestre || '-',
                Turno: r.turno == 1 ? 'Matutino' : 'Vespertino',
                Grupo: r.grupo || '-',
                Alumno: r.nombre || 'SIN NOMBRE',
                Materia: r.materia || 'N/A',
                Docente: r.nombre_doc || 'N/A',
                Promedio: parseFloat(r.prom_uni) || 0,
                Genero: r.genero == 1 ? 'Hombre' : 'Mujer',
                Estatus: r.estatus || 'I',
                Tipo: r.tipo_alumno || 'N',
                Semaforo: getSemaforoTag(parseFloat(r.prom_uni) || 0)
            }));

            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            await store.clear();
            processed.forEach(item => store.add(item));
            
            return new Promise(resolve => {
                tx.oncomplete = () => {
                    document.getElementById('loader').style.display = 'none';
                    location.reload();
                    resolve();
                };
            });
        }

        // Carga automática desde GitHub al iniciar
        async function loadDataFromSource() {
            try {
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('loader-text').innerText = "Sincronizando con GitHub...";
                
                const response = await fetch(GITHUB_DATA_URL);
                if (!response.ok) throw new Error("No se encontró el archivo RIACarga.xlsx");
                
                const buffer = await response.arrayBuffer();
                await processAndSaveData(buffer);
            } catch (err) {
                console.error("Error cargando datos automáticos:", err);
                document.getElementById('loader').style.display = 'none';
            }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('loader').style.display = 'flex';
            const reader = new FileReader();
            reader.onload = async (evt) => {
                await processAndSaveData(evt.target.result);
            };
            reader.readAsArrayBuffer(file);
        };

        const getSemaforoTag = (p) => {
            if (p <= 4) return 'ROJO';
            if (p <= 6) return 'AMARILLO';
            if (p <= 8) return 'NARANJA';
            return 'VERDE';
        };

        const renderCharts = (items) => {
            const conf = { responsive: true, margin: { t: 40, b: 20, l: 20, r: 20 } };
            const countBy = (field) => items.reduce((acc, obj) => { acc[obj[field]] = (acc[obj[field]] || 0) + 1; return acc; }, {});

            Plotly.newPlot('chart-genero', [{ values: Object.values(countBy('Genero')), labels: Object.keys(countBy('Genero')), type: 'pie', marker:{colors:['#0f172a','#78350f']} }], { title: 'Género', ...conf });
            Plotly.newPlot('chart-turno', [{ values: Object.values(countBy('Turno')), labels: Object.keys(countBy('Turno')), type: 'pie', hole: .4 }], { title: 'Turno', ...conf });
            Plotly.newPlot('chart-estatus', [{ x: Object.keys(countBy('Estatus')), y: Object.values(countBy('Estatus')), type: 'bar', marker:{color:'#94a3b8'} }], { title: 'Estatus', ...conf });
            Plotly.newPlot('chart-tipo', [{ x: Object.keys(countBy('Tipo')), y: Object.values(countBy('Tipo')), type: 'bar', marker:{color:'#fbbf24'} }], { title: 'Tipo Alumno', ...conf });
            
            const plantelesAvg = {};
            items.forEach(i => { if(!plantelesAvg[i.Plantel]) plantelesAvg[i.Plantel] = { sum:0, ct:0 }; plantelesAvg[i.Plantel].sum += i.Promedio; plantelesAvg[i.Plantel].ct++; });
            const ranking = Object.keys(plantelesAvg).map(k => ({ p: k, avg: plantelesAvg[k].sum / plantelesAvg[k].ct })).sort((a,b)=>b.avg - a.avg).slice(0, 10);
            Plotly.newPlot('chart-ranking', [{ y: ranking.map(x=>x.p), x: ranking.map(x=>x.avg), type: 'bar', orientation: 'h', marker:{color:'#065f46'} }], { title: 'Ranking Planteles', ...conf });

            const r = { '0-4': 0, '4.1-6': 0, '6.1-8': 0, '>8': 0 };
            items.forEach(i => { if(i.Promedio <= 4) r['0-4']++; else if(i.Promedio <= 6) r['4.1-6']++; else if(i.Promedio <= 8) r['6.1-8']++; else r['>8']++; });
            Plotly.newPlot('chart-rangos', [{ x: Object.keys(r), y: Object.values(r), type: 'bar', marker:{color:'#78350f'} }], { title: 'Rangos Promedio', ...conf });
        };

        const fillSelect = (id, vals) => {
            const s = document.getElementById(id);
            s.innerHTML = '<option value="ALL">TODOS</option>' + vals.map(v => `<option value="${v}">${v}</option>`).join('');
        };

        const setupFilters = () => {
            const getU = (f) => [...new Set(dataGlobal.map(d => d[f]))].sort();
            fillSelect('f-plantel', getU('Plantel'));
            fillSelect('f-semestre', getU('Semestre'));
            fillSelect('f-docente', getU('Docente'));
            fillSelect('f-turno', getU('Turno'));
            fillSelect('f-tipo', getU('Tipo'));
            fillSelect('f-sector', getU('Genero'));
        };

        const applyFilters = () => {
            const selectors = ['f-plantel','f-semestre','f-docente','f-turno','f-tipo','f-sector','f-semaforo'].map(id => document.getElementById(id).value);
            dataFiltered = dataGlobal.filter(d => 
                (selectors[0] === 'ALL' || d.Plantel === selectors[0]) &&
                (selectors[1] === 'ALL' || d.Semestre == selectors[1]) &&
                (selectors[2] === 'ALL' || d.Docente === selectors[2]) &&
                (selectors[3] === 'ALL' || d.Turno === selectors[3]) &&
                (selectors[4] === 'ALL' || d.Tipo === selectors[4]) &&
                (selectors[5] === 'ALL' || d.Genero === selectors[5]) &&
                (selectors[6] === 'ALL' || d.Semaforo === selectors[6])
            );
            renderTable(dataFiltered);
            updateStats(dataFiltered);
            renderCharts(dataFiltered);
        };

        const updateStats = (items) => {
            document.getElementById('stat-alumnos').innerText = [...new Set(items.map(i=>i.Alumno))].length;
            document.getElementById('stat-registros').innerText = items.length;
            document.getElementById('stat-planteles').innerText = [...new Set(items.map(i=>i.Plantel))].length;
            const avg = items.reduce((acc, curr) => acc + curr.Promedio, 0) / (items.length || 1);
            document.getElementById('stat-promedio').innerText = avg.toFixed(1);
        };

        const renderTable = (items) => {
            document.getElementById('tableBody').innerHTML = items.slice(0, 800).map((d, i) => `
                <tr class="hover:bg-white transition-colors">
                    <td class="p-3 text-center font-black text-stone-300 border-r">${i+1}</td>
                    <td class="p-3 font-bold">${d.Plantel}</td>
                    <td class="p-3 text-center">${d.Semestre}</td>
                    <td class="p-3 text-[10px]">${d.Turno}</td>
                    <td class="p-3 text-center font-bold text-amber-800">${d.Grupo}</td>
                    <td class="p-3 font-semibold">${d.Alumno}</td>
                    <td class="p-3 text-stone-500">${d.Materia}</td>
                    <td class="p-3 text-center font-black ${d.Promedio < 6 ? 'text-red-600':'text-emerald-700'}">${d.Promedio.toFixed(1)}</td>
                    <td class="p-3 text-center">
                        <div class="inline-block w-3 h-3 rounded-full ${d.Semaforo === 'ROJO' ? 'bg-red-500' : d.Semaforo === 'AMARILLO' ? 'bg-yellow-400' : d.Semaforo === 'NARANJA' ? 'bg-orange-500' : 'bg-emerald-500'}"></div>
                    </td>
                </tr>
            `).join('');
        };

        function exportToExcel() {
            const worksheet = XLSX.utils.json_to_sheet(dataFiltered);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Reporte RIA");
            XLSX.writeFile(workbook, "Reporte_RIA_Filtrado.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.setFontSize(18);
            doc.setTextColor(15, 23, 42);
            doc.text("REPORTE ACADÉMICO RIA - SISTEMA SEMS", 14, 20);
            doc.setFontSize(10);
            doc.text(`Registros: ${dataFiltered.length} | Promedio: ${document.getElementById('stat-promedio').innerText}`, 14, 28);
            const tableRows = dataFiltered.slice(0, 50).map((d, i) => [
                i+1, d.Plantel, d.Semestre, d.Turno, d.Grupo, d.Alumno, d.Materia, d.Promedio.toFixed(1), d.Semaforo
            ]);
            doc.autoTable({
                head: [['N°', 'Plantel', 'Sem', 'Turno', 'Gp', 'Alumno', 'Materia', 'Prom', 'Semaforo']],
                body: tableRows,
                startY: 35,
                theme: 'striped',
                headStyles: { fillBlue: [15, 23, 42], fontSize: 8 },
                styles: { fontSize: 7 }
            });
            doc.save("Reporte_Profesional_RIA.pdf");
        }

        const clearDatabase = () => { if(confirm("¿Limpiar base de datos local? Esto forzará una recarga desde el archivo del servidor.")) { indexedDB.deleteDatabase(DB_NAME); location.reload(); } };

        window.onload = async () => {
            await initDB();
            db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).getAll().onsuccess = (e) => {
                dataGlobal = e.target.result;
                if (dataGlobal.length > 0) { 
                    setupFilters(); 
                    applyFilters(); 
                } else {
                    // Si no hay datos en IndexedDB, intentamos cargar el archivo automáticamente
                    loadDataFromSource();
                }
            };
        };
    </script>
</body>
</html>
