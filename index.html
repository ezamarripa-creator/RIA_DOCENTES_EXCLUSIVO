<!DOCTYPE html>
<html lang="es">
<head>
    <script>
    (function() {
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
      
       document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            if ((e.ctrlKey && (key === 'u' || key === 's' || key === 'c' || key === 'i' || key === 'j')) ||
                (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) ||
                e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        });
        
        let devtoolsTriggered = false;
        setInterval(function() {
            if (devtoolsTriggered) return;
            const before = new Date();
            debugger; 
            const after = new Date();
            if (after - before > 100) { 
                devtoolsTriggered = true;
                document.body.innerHTML = '<div style="text-align:center; padding:50px; font-family:sans-serif;"><h1 style="color:#042C53;">⚠️ Acceso no autorizado</h1><p>El uso de herramientas de desarrollo no está permitido en este recurso institucional.</p><p style="font-size:14px; margin-top:30px;">🔒 COBAED · Dirección Académica</p></div>';
            }
        }, 2000);
        
        const style = document.createElement('style');
        style.textContent = `body { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; }`;
        document.head.appendChild(style);
    })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SEMS - Dashboard Ejecutivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --negro: #0f172a;
            --tierra: #78350f;
            --beige: #f5f5f4;
            --gris-base: #e2e8f0;
            --crema: #fffbeb;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--beige); 
            color: var(--negro); 
        }
        
        .kpi-card { 
            background: white; 
            border-top: 4px solid var(--tierra); 
            border-radius: 0.25rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        
        .badge-riesgo {
            background-color: var(--negro);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 4px;
        }

        #loadingOverlay { 
            display: none; 
            background: rgba(15, 23, 42, 0.9); 
            z-index: 9999; 
            position: fixed; 
            inset: 0; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }

        select {
            background-color: white;
            border: 1px solid var(--gris-base);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-amber-500 mb-4"></div>
        <p id="loadingText" class="text-xs font-bold tracking-[0.3em] uppercase">Sincronizando datos...</p>
    </div>

    <nav class="bg-slate-950 text-white p-6 shadow-2xl border-b-4 border-amber-900">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="h-10 w-1 bg-amber-700"></div>
                <div>
                    <h1 class="text-xl font-light tracking-widest uppercase">Sistema de Análisis <span class="font-bold">COBAED</span></h1>
                    <p class="text-[9px] text-slate-400 tracking-tighter">CONTROL ACADÉMICO ESTRATÉGICO</p>
                </div>
            </div>
            <button onclick="clearDatabase()" class="text-stone-500 hover:text-red-400 text-[10px] uppercase font-bold">Reiniciar Sistema</button>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
            <div class="kpi-card p-6"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Población Estudiantil</p><h2 id="kpi-alumnos" class="text-3xl font-bold">0</h2></div>
            <div class="kpi-card p-6">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Muestra Filtrada</p>
                    <span id="kpi-pct-riesgo" class="badge-riesgo">0% RIESGO</span>
                </div>
                <h2 id="kpi-registros" class="text-3xl font-bold">0</h2>
            </div>
            <div class="kpi-card p-6"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Centros Educativos</p><h2 id="kpi-planteles" class="text-3xl font-bold">0</h2></div>
            <div class="kpi-card p-6"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Promedio General</p><h2 id="kpi-promedio" class="text-3xl font-bold text-amber-900">0.0</h2></div>
            <div class="kpi-card p-6"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Universo Total</p><h2 id="kpi-total-global" class="text-3xl font-bold text-slate-300">0</h2></div>
        </div>

        <div class="bg-white p-6 rounded shadow-sm border border-stone-200 grid grid-cols-2 md:grid-cols-5 lg:grid-cols-10 gap-4 mb-8">
            <select id="f-plantel" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-semestre" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-materia" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-docente" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-turno-filter" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-nucleo" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-area" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-tipo" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-sector" onchange="applyFilters()" class="text-[10px] p-2 rounded"></select>
            <select id="f-semaforo" onchange="applyFilters()" class="text-[10px] p-2 rounded font-bold border-amber-200 bg-crema">
                <option value="ALL">SEMÁFORO (TODOS)</option>
                <option value="ROJO">🔴 CRÍTICO (0 - 4.0)</option>
                <option value="AMARILLO">🟡 RIESGO (4.1 - 6.0)</option>
                <option value="NARANJA">🟠 REGULAR (6.1 - 8.0)</option>
                <option value="VERDE">🟢 ÓPTIMO (> 8.0)</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100"><div id="chart-semaforo-dist" class="h-72"></div></div>
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100"><div id="chart-genero" class="h-72"></div></div>
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100"><div id="chart-turno" class="h-72"></div></div>
            <div class="bg-white p-4 rounded shadow-sm border border-stone-100"><div id="chart-estatus" class="h-72"></div></div>
        </div>
    </main>

    <script>
        const DB_NAME = 'SemsPremiumDB';
        const STORE_NAME = 'records';
        const FILE_ID = '1NI7hAhBDk3M1jRr4-d70Stoo3EOpqPVl';
        let db;
        let dataGlobal = [];
        let currentFilteredData = [];

        const PALETA = { negro: '#0f172a', tierra: '#78350f', beige: '#f5f5f4', crema: '#fffbeb', gris: '#94a3b8' };

        const initDB = () => {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
            });
        };

        async function fetchFromDrive() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            try {
                const url = `https://docs.google.com/spreadsheets/d/${FILE_ID}/export?format=xlsx`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Acceso denegado a Drive.");
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                saveDataToDB(json);
            } catch (error) {
                overlay.style.display = 'none';
            }
        }

        const saveDataToDB = async (rawData) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            await store.clear();
            rawData.forEach(item => store.add(item));
            tx.oncomplete = () => {
                dataGlobal = rawData;
                setupFilters(); 
                applyFilters();
                document.getElementById('loadingOverlay').style.display = 'none';
            };
        };

        const setupFilters = () => {
            const fields = {
                'f-plantel':'plantel', 'f-semestre':'semestre', 'f-materia':'materia', 
                'f-docente':'nombre_doc', 'f-turno-filter':'turno', 'f-nucleo':'NUCLEO', 
                'f-area':'Área de conocimiento', 'f-tipo':'TIPO', 'f-sector':'SECTOR'
            };
            Object.keys(fields).forEach(id => {
                const vals = [...new Set(dataGlobal.map(item => item[fields[id]]))].filter(Boolean).sort();
                let label = id.replace('f-', '').replace('-filter','').toUpperCase();
                document.getElementById(id).innerHTML = `<option value="ALL">${label}</option>` + vals.map(v => `<option value="${v}">${v}</option>`).join('');
            });
        };

        const applyFilters = () => {
            const f = {
                p: document.getElementById('f-plantel').value,
                s: document.getElementById('f-semestre').value,
                m: document.getElementById('f-materia').value,
                d: document.getElementById('f-docente').value,
                tr: document.getElementById('f-turno-filter').value,
                n: document.getElementById('f-nucleo').value,
                a: document.getElementById('f-area').value,
                t: document.getElementById('f-tipo').value,
                sec: document.getElementById('f-sector').value,
                sema: document.getElementById('f-semaforo').value
            };

            currentFilteredData = dataGlobal.filter(d => {
                const pass = (f.p === 'ALL' || d.plantel == f.p) && 
                             (f.s === 'ALL' || d.semestre == f.s) && 
                             (f.m === 'ALL' || d.materia == f.m) && 
                             (f.d === 'ALL' || d.nombre_doc == f.d) && 
                             (f.tr === 'ALL' || d.turno == f.tr) &&
                             (f.n === 'ALL' || d.NUCLEO == f.n) && 
                             (f.a === 'ALL' || d['Área de conocimiento'] == f.a) && 
                             (f.t === 'ALL' || d.TIPO == f.t) && 
                             (f.sec === 'ALL' || d.SECTOR == f.sec);
                
                if (!pass) return false;
                if (f.sema === 'ALL') return true;
                const v = parseFloat(d.cal_1) || 0;
                if (f.sema === 'ROJO') return v <= 4.0;
                if (f.sema === 'AMARILLO') return v > 4.0 && v <= 6.0;
                if (f.sema === 'NARANJA') return v > 6.0 && v <= 8.0;
                if (f.sema === 'VERDE') return v > 8.0;
                return true;
            });

            updateKPIs(currentFilteredData);
            updateCharts(currentFilteredData);
        };

        const updateKPIs = (data) => {
            const totalFiltrados = data.length;
            const registrosRiesgo = data.filter(d => (parseFloat(d.cal_1) || 0) < 6.0).length;
            const porcentajeRiesgo = totalFiltrados > 0 ? ((registrosRiesgo / totalFiltrados) * 100).toFixed(1) : "0.0";

            document.getElementById('kpi-alumnos').innerText = new Set(data.map(d => d.matricula)).size.toLocaleString();
            document.getElementById('kpi-registros').innerText = totalFiltrados.toLocaleString();
            document.getElementById('kpi-pct-riesgo').innerText = `${porcentajeRiesgo}% RIESGO ACADÉMICO`;
            document.getElementById('kpi-total-global').innerText = dataGlobal.length.toLocaleString();
            document.getElementById('kpi-planteles').innerText = new Set(data.map(d => d.plantel)).size;
            const sum = data.reduce((acc, curr) => acc + (parseFloat(curr.cal_1) || 0), 0);
            document.getElementById('kpi-promedio').innerText = (sum / (totalFiltrados || 1)).toFixed(1);
        };

        const updateCharts = (data) => {
            const config = { responsive: true, displayModeBar: false };
            const layoutBase = { 
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', 
                font: { size: 10, family: 'Inter', color: PALETA.negro }, 
                margin: { t: 40, b: 60, l: 40, r: 20 } 
            };
            const getCounts = (f) => { const c = {}; data.forEach(d => c[d[f]] = (c[d[f]] || 0) + 1); return c; };

            const total = data.length || 1;
            const dist = {"0-4":0, "4.1-6":0, "6.1-8":0, "> 8":0};
            data.forEach(d => {
                const v = parseFloat(d.cal_1) || 0;
                if (v <= 4.0) dist["0-4"]++; else if (v <= 6.0) dist["4.1-6"]++; else if (v <= 8.0) dist["6.1-8"]++; else dist["> 8"]++;
            });
            const pctDist = Object.values(dist).map(v => ((v/total)*100).toFixed(1));
            Plotly.newPlot('chart-semaforo-dist', [{
                x: Object.keys(dist), y: pctDist, type: 'bar', text: pctDist.map(v=>v+'%'), textposition: 'auto',
                marker: {color: ['#ef4444', '#facc15', '#fb923c', '#22c55e']}
            }], { ...layoutBase, title: 'DISTRIBUCIÓN %' }, config);

            Plotly.newPlot('chart-genero', [{ 
                values: Object.values(getCounts('genero')), labels: Object.keys(getCounts('genero')), 
                type: 'pie', hole: .6, marker: { colors: [PALETA.negro, PALETA.gris] }
            }], { ...layoutBase, title: 'GÉNERO' }, config);

            Plotly.newPlot('chart-turno', [{ 
                x: Object.keys(getCounts('turno')), y: Object.values(getCounts('turno')), 
                type: 'bar', marker: {color: PALETA.tierra} 
            }], { ...layoutBase, title: 'TURNO' }, config);

            Plotly.newPlot('chart-estatus', [{ 
                values: Object.values(getCounts('estatus')), labels: Object.keys(getCounts('estatus')), 
                type: 'pie', marker: { colors: [PALETA.negro, PALETA.tierra, PALETA.gris] }
            }], { ...layoutBase, title: 'ESTATUS' }, config);
        };

        const clearDatabase = () => { if(confirm("¿Borrar datos locales y reiniciar?")) { indexedDB.deleteDatabase(DB_NAME); location.reload(); } };

        window.onload = async () => {
            await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).getAll();
            tx.onsuccess = (e) => {
                if (e.target.result.length > 0) { 
                    dataGlobal = e.target.result; 
                    setupFilters(); 
                    applyFilters(); 
                } else {
                    fetchFromDrive();
                }
            };
        };
    </script>
</body>
</html>
